services:
  postgres:
    image: postgres:15
    container_name: portfolio_postgres
    restart: always
    environment:
      POSTGRES_DB: portfolio_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: portfolio_backend
    restart: always
    depends_on:
      - postgres
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_NAME: portfolio_db
    ports:
      - "4000:4000"
    volumes:
      - ./backend/uploads:/app/uploads

  frontend:
    build: ./frontend
    container_name: portfolio_frontend
    restart: always
    depends_on:
      - backend
    ports:
      - "5173:5173"
    env_file:
      - ./frontend/.env.docker

  frontend_next:
    build: ./frontend-next
    container_name: portfolio_frontend_next
    restart: always
    depends_on:
      - backend
    environment:
      API_URL: http://backend:4000
      PUBLIC_BACKEND_URL: http://localhost:4000
    ports:
      - "3000:3000"

volumes:
  postgres_data: